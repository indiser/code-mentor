kind = "web"
previewPath = "/"
title = "Debug Mentor"
version = "1.0.0"
id = "artifacts/debugger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22620

[services.development]
run = "pnpm --filter @workspace/debugger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/debugger", "run", "build" ]
publicDir = "artifacts/debugger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22620"
BASE_PATH = "/"
